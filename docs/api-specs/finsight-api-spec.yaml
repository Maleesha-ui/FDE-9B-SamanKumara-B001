  # ============================================
  /reconciliation/{batchId}:
    get:
      tags:
        - Reconciliation
      summary: Get Reconciliation Results
      description: |
        Retrieves reconciliation results by batch ID.
        Used for audit and monitoring purposes.
      operationId: getReconciliation
      security:
        - OAuth2:
            - read:reconciliation
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: batchId
          in: path
          required: true
          description: Batch ID of reconciliation
          schema:
            type: string
            example: "BATCH-GL-20260328-0930"
      responses:
        '200':
          description: Success
