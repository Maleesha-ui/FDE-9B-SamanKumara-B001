                $ref: '#/components/schemas/ErrorResponse'

  # ============================================
  # DST-007: Health Check
  # ============================================
  /health:
    get:
      tags:
        - System
      summary: API Health Check
      description: |
        Returns API health status for monitoring purposes.
        Used by monitoring stack to check API availability.
      operationId: healthCheck
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, unhealthy]
                  version:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  services:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        status:
                          type: string
                        latency:
                          type: number
              example:
                status: "healthy"
                version: "4.2.0"
                timestamp: "2026-03-28T09:30:00+05:30"
                services:
                  database:
                    status: "healthy"
                    latency: 5
                  kafka:
                    status: "healthy"
                    latency: 10

  # ============================================
  # DST-008: Get Rate Limits
  # ============================================
  /rate-limits:
    get:
      tags:
        - System
      summary: Get Rate Limit Status
      description: |
        Returns current rate limit status for the authenticated client.
        Used by integration to monitor usage.
      operationId: getRateLimits
      security:
        - OAuth2:
            - write:journal
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  limits:
                    type: object
                    properties:
                      journalEntries:
                        type: object
                        properties:
                          limit:
                            type: integer
                          remaining:
                            type: integer
                          reset:
                            type: string
                            format: date-time
                      vendors:
                        type: object
                        properties:
                          limit:
                            type: integer
                          remaining:
                            type: integer
                          reset:
                            type: string
                            format: date-time
              example:
                limits:
                  journalEntries:
                    limit: 1000
                    remaining: 987
                    reset: "2026-03-28T09:31:00+05:30"
                  vendors:
                    limit: 1000
                    remaining: 999
                    reset: "2026-03-28T09:31:00+05:30"